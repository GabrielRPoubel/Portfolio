* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: #000; color: #e8e8e8;
  font-family: 'ClassyVogue', Georgia, serif;
  min-height: 100vh; overflow-x: hidden;
}

/* NAV DESKTOP */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: 1.4rem 2.5rem;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  transition: opacity 0.6s ease, background 0.6s ease;
}
nav.scrolled { opacity: 0; pointer-events: none; }
nav:hover { opacity: 1 !important; pointer-events: all !important; background: rgba(0,0,0,0.6); }

.logo {
  font-size: 3rem; letter-spacing: 0.14em; color: #fff;
  font-family: 'ClassyVogue', Georgia, serif; font-weight: normal;
}
.nav-links { display: flex; gap: 2.5rem; list-style: none; align-items: center; }
.nav-links a {
  color: #777; text-decoration: none; font-size: 0.85rem;
  letter-spacing: 0.22em; transition: color 0.3s; cursor: pointer;
  font-family: 'NexaHeavy', Georgia, serif;
}
.nav-links a:hover, .nav-links a.active { color: #fff; }
.nav-links .ig-link { display: flex; align-items: center; }
.nav-links .ig-link svg { width: 22px; height: 22px; fill: none; stroke: #777; stroke-width: 1.4; transition: stroke 0.3s; }
.nav-links .ig-link:hover svg { stroke: #fff; }

/* MOBILE NAV */
.mobile-nav { display: none; }
.hamburger {
  background: none; border: none; cursor: pointer; padding: 4px;
  display: flex; flex-direction: column; gap: 5px;
}
.hamburger span {
  display: block; width: 22px; height: 1.5px; background: #fff;
  transition: all 0.3s;
}
.mobile-logo {
  font-size: 1.6rem; letter-spacing: 0.1em; color: #fff;
  font-family: 'ClassyVogue', Georgia, serif; font-weight: normal;
  text-align: center; flex: 1;
}
.mobile-ig { display: flex; align-items: center; }
.mobile-ig svg { width: 20px; height: 20px; fill: none; stroke: #777; stroke-width: 1.4; }

.drawer {
  position: fixed; top: 0; left: -100%; width: 70%; max-width: 260px;
  height: 100vh; background: rgba(0,0,0,0.97);
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  z-index: 200; transition: left 0.35s cubic-bezier(0.4,0,0.2,1);
  display: flex; flex-direction: column; padding: 4rem 2rem 2rem;
  gap: 2rem;
}
.drawer.open { left: 0; }
.drawer a {
  color: #aaa; text-decoration: none; font-size: 1rem;
  letter-spacing: 0.25em; font-family: 'NexaHeavy', Georgia, serif;
  cursor: pointer; transition: color 0.3s; border-bottom: 1px solid #1a1a1a; padding-bottom: 1rem;
}
.drawer a:hover, .drawer a.active { color: #fff; }
.drawer-close {
  position: absolute; top: 1.2rem; right: 1.2rem;
  background: none; border: none; color: #555; font-size: 1.5rem;
  cursor: pointer; transition: color 0.3s;
}
.drawer-close:hover { color: #fff; }
.drawer-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
  z-index: 199;
}
.drawer-overlay.open { display: block; }

/* PAGES */
.page { display: none; min-height: 100vh; }
.page.active { display: block; }

/* HOME */
.photo-feed { display: flex; flex-direction: column; gap: 6px; padding-bottom: 6px; }
.feed-item { width: 100%; cursor: pointer; overflow: hidden; background: #050505; }
.feed-item img {
  width: 100%; display: block;
  filter: grayscale(100%) contrast(1.06);
  transition: opacity 0.5s; opacity: 0.88;
}
.feed-item:hover img { opacity: 1; }

/* GALERIA */
#galeria { padding: 5.5rem 1.5rem 3rem; }
.grid-gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; }
.grid-item { overflow: hidden; cursor: pointer; background: #050505; aspect-ratio: 1; }
.grid-item img {
  width: 100%; height: 100%; object-fit: cover;
  filter: grayscale(100%) contrast(1.06);
  transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.4s;
  opacity: 0.82;
}
.grid-item:hover img { transform: scale(1.04); opacity: 1; }

/* LIGHTBOX */
.lightbox {
  display: none; position: fixed; inset: 0;
  background: #000; z-index: 1000;
  flex-direction: column; align-items: center; justify-content: center;
}
.lightbox.active { display: flex; }

.lb-toolbar {
  position: absolute; top: 0; left: 0; right: 0;
  display: flex; justify-content: flex-end; align-items: center;
  padding: 1rem 1.5rem; gap: 1rem;
  background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
}
.lb-btn {
  background: none; border: none; cursor: pointer;
  color: #666; transition: color 0.3s; padding: 4px;
  display: flex; align-items: center; justify-content: center;
}
.lb-btn:hover { color: #fff; }
.lb-btn svg { width: 22px; height: 22px; }

.lb-img-wrap {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 100%;
  transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
}
.lb-img-wrap img {
  max-width: 90vw; max-height: 88vh; object-fit: contain;
  filter: grayscale(100%) contrast(1.06); display: block;
  transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
}

.lb-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: #333; font-size: 2.5rem;
  cursor: pointer; padding: 1rem; transition: color 0.3s; line-height: 1;
}
.lb-nav:hover { color: #fff; }
.lb-prev { left: 0.5rem; }
.lb-next { right: 0.5rem; }

.lb-counter {
  position: absolute; bottom: 1.2rem; left: 50%; transform: translateX(-50%);
  font-size: 0.7rem; letter-spacing: 0.3em; color: #444;
  font-family: 'NexaHeavy', Georgia, serif;
}

/* fullscreen */
.lightbox:-webkit-full-screen { background: #000; }
.lightbox:-moz-full-screen    { background: #000; }
.lightbox:fullscreen           { background: #000; }

/* MOBILE */
@media (max-width: 768px) {
  nav { display: none; }
  .mobile-nav {
    display: flex; position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    align-items: center; padding: 1rem 1.2rem;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    transition: opacity 0.6s ease;
  }
  .mobile-nav.scrolled { opacity: 0; pointer-events: none; }
  .mobile-nav:hover { opacity: 1 !important; pointer-events: all !important; }

  #galeria { padding: 4.5rem 0.5rem 2rem; }
  .grid-gallery { grid-template-columns: repeat(3, 1fr); gap: 3px; }

  .lb-btn.rotate-btn { display: flex; }

  .lb-img-wrap img { max-width: 100vw; max-height: 82vh; }
  .lb-nav { font-size: 1.8rem; padding: 0.4rem; }
  .lb-prev { left: 0; }
  .lb-next { right: 0; }
  .lb-counter { font-size: 0.6rem; bottom: 0.8rem; }
}

@media (max-width: 480px) {
  .mobile-logo { font-size: 1.3rem; }
  .grid-gallery { grid-template-columns: repeat(2, 1fr); }
}

/* botão rotate só aparece no mobile */
.rotate-btn { display: none; }
</style>
</head>
<body>

<!-- NAV DESKTOP -->
<nav id="nav">
  <span class="logo">GABRIEL POUBEL</span>
  <ul class="nav-links">
    <li><a class="active" onclick="showPage('home',this)">INÍCIO</a></li>
    <li><a onclick="showPage('galeria',this)">GALERIA</a></li>
    <li>
      <a href="https://instagram.com/gabrielrpoubel" target="_blank" class="ig-link" title="Instagram">
        <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4.5"/><circle cx="17.5" cy="6.5" r="1" fill="#777" stroke="none"/></svg>
      </a>
    </li>
  </ul>
</nav>

<!-- NAV MOBILE -->
<nav class="mobile-nav" id="mobile-nav">
  <button class="hamburger" onclick="openDrawer()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <span class="mobile-logo">GABRIEL POUBEL</span>
  <a href="https://instagram.com/gabrielrpoubel" target="_blank" class="mobile-ig" title="Instagram">
    <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4.5"/><circle cx="17.5" cy="6.5" r="1" fill="#777" stroke="none"/></svg>
  </a>
</nav>

<!-- DRAWER MOBILE -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" onclick="closeDrawer()">×</button>
  <a class="active" onclick="showPage('home',this);closeDrawer()">INÍCIO</a>
  <a onclick="showPage('galeria',this);closeDrawer()">GALERIA</a>
</div>

<!-- PAGES -->
<div id="home" class="page active">
  <div class="photo-feed" id="feed"></div>
</div>
<div id="galeria" class="page">
  <div class="grid-gallery" id="grid"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="lb-toolbar">
    <!-- Rotate (mobile only) -->
    <button class="lb-btn rotate-btn" id="rotate-btn" onclick="rotateLB()" title="Girar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 2v6h-6"/>
        <path d="M21 8C19.5 5 16.5 3 13 3a9 9 0 1 0 8.46 12"/>
      </svg>
    </button>
    <!-- Fullscreen -->
    <button class="lb-btn" id="fs-btn" onclick="toggleFS()" title="Tela cheia">
      <svg id="fs-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
        <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
        <path d="M3 16v3a2 2 0 0 0 2 2h3"/>
        <path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
      </svg>
    </button>
    <!-- Fechar -->
    <button class="lb-btn" onclick="closeLB()" title="Fechar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <button class="lb-nav lb-prev" onclick="lbNav(-1)">‹</button>
  <div class="lb-img-wrap" id="lb-wrap">
    <img id="lb-img" src="" alt="">
  </div>
  <button class="lb-nav lb-next" onclick="lbNav(1)">›</button>
  <div class="lb-counter" id="lb-counter"></div>
</div>

<script>
    // ─── FOTOS ───────────────────────────────────────────────────────────────
  // Gerado automaticamente por gerar.py — não edite manualmente
  const fotos = [
    1,
    2,
    3,
  ].map(n => ({ src: `fotos/${n}.jpg`, alt: `${n}` }));
  // ─────────────────────────────────────────────────────────────────────────

  const feed = document.getElementById('feed');
  const grid = document.getElementById('grid');

  fotos.forEach((p, i) => {
    const fdiv = document.createElement('div');
    fdiv.className = 'feed-item'; fdiv.onclick = () => openLB(i);
    const fimg = document.createElement('img');
    fimg.src = p.src; fimg.alt = p.alt; fimg.loading = 'lazy';
    fdiv.appendChild(fimg); feed.appendChild(fdiv);

    const gdiv = document.createElement('div');
    gdiv.className = 'grid-item'; gdiv.onclick = () => openLB(i);
    const gimg = document.createElement('img');
    gimg.src = p.src; gimg.alt = p.alt; gimg.loading = 'lazy';
    gdiv.appendChild(gimg); grid.appendChild(gdiv);
  });

  function showPage(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-links a:not(.ig-link), .drawer a').forEach(a => a.classList.remove('active'));
    if (el) el.classList.add('active');
    window.scrollTo(0, 0);
  }

  // Scroll fade
  window.addEventListener('scroll', () => {
    const gone = window.scrollY > 80;
    document.getElementById('nav').classList.toggle('scrolled', gone);
    document.getElementById('mobile-nav').classList.toggle('scrolled', gone);
  }, { passive: true });

  // Drawer
  function openDrawer() {
    document.getElementById('drawer').classList.add('open');
    document.getElementById('drawer-overlay').classList.add('open');
  }
  function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawer-overlay').classList.remove('open');
  }

  // Lightbox
  let lbIndex = 0;
  let lbRotation = 0;

  function openLB(i) {
    lbIndex = i; lbRotation = 0;
    updateLB();
    document.getElementById('lightbox').classList.add('active');
  }
  function closeLB() {
    document.getElementById('lightbox').classList.remove('active');
    if (document.fullscreenElement) document.exitFullscreen();
  }
  function lbNav(d) {
    lbIndex = (lbIndex + d + fotos.length) % fotos.length;
    lbRotation = 0;
    updateLB();
  }
  function updateLB() {
    document.getElementById('lb-img').src = fotos[lbIndex].src;
    document.getElementById('lb-img').style.transform = '';
    document.getElementById('lb-counter').textContent = (lbIndex + 1) + ' / ' + fotos.length;
  }

  function rotateLB() {
    lbRotation = (lbRotation + 90) % 360;
    document.getElementById('lb-img').style.transform = 'rotate(' + lbRotation + 'deg)';
  }

  function toggleFS() {
    const lb = document.getElementById('lightbox');
    if (!document.fullscreenElement) {
      lb.requestFullscreen && lb.requestFullscreen();
    } else {
      document.exitFullscreen && document.exitFullscreen();
    }
  }

  document.addEventListener('fullscreenchange', () => {
    const icon = document.getElementById('fs-icon');
    if (document.fullscreenElement) {
      icon.innerHTML = '<path d="M8 3v3a2 2 0 0 1-2 2H3"/><path d="M21 8h-3a2 2 0 0 1-2-2V3"/><path d="M3 16h3a2 2 0 0 1 2 2v3"/><path d="M16 21v-3a2 2 0 0 1 2-2h3"/>';
    } else {
      icon.innerHTML = '<path d="M8 3H5a2 2 0 0 0-2 2v3"/><path d="M21 8V5a2 2 0 0 0-2-2h-3"/><path d="M3 16v3a2 2 0 0 0 2 2h3"/><path d="M16 21h3a2 2 0 0 0 2-2v-3"/>';
    }
  });

  document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeLB();
  });
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('active')) return;
    if (e.key === 'ArrowRight') lbNav(1);
    if (e.key === 'ArrowLeft') lbNav(-1);
    if (e.key === 'Escape') closeLB();
    if (e.key === 'f' || e.key === 'F') toggleFS();
  });
</script>
</body>
</html>

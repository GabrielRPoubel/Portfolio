<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gabriel Poubel</title>
  <link rel="icon" type="image/png" href="/favicon.png">
  <script defer src="https://cdn.vercel-insights.com/v1/speed-insights/script.js"></script>
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</head>
<body>

<div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>

<!-- NAV DESKTOP -->
<nav id="nav">
  <span class="logo" onclick="showPage('home', document.querySelector('.nav-links a'))">GABRIEL POUBEL</span>
  <ul class="nav-links">
    <li><a class="active" onclick="showPage('home', this)">INÍCIO</a></li>
    <li><a onclick="showPage('galeria', this)">GALERIA</a></li>
    <li>
      <a href="https://instagram.com/gabrielrpoubel" target="_blank" class="ig-link" title="Instagram">
        <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4.5"/><circle cx="17.5" cy="6.5" r="1" fill="#777" stroke="none"/></svg>
      </a>
    </li>
  </ul>
</nav>

<!-- NAV MOBILE -->
<nav class="mobile-nav" id="mobile-nav">
  <button class="hamburger" onclick="openDrawer()">
    <span></span><span></span><span></span>
  </button>
  <span class="mobile-logo" onclick="showPage('home', document.querySelector('.drawer a'))">GABRIEL POUBEL</span>
  <a href="https://instagram.com/gabrielrpoubel" target="_blank" class="mobile-ig">
    <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4.5"/><circle cx="17.5" cy="6.5" r="1" fill="#777" stroke="none"/></svg>
  </a>
</nav>

<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <button class="drawer-close" onclick="closeDrawer()">×</button>
  <a class="active" onclick="showPage('home', this); closeDrawer()">INÍCIO</a>
  <a onclick="showPage('galeria', this); closeDrawer()">GALERIA</a>
</div>

<!-- PAGES -->
<div id="home" class="page active">
  <div class="photo-feed" id="feed"></div>
</div>
<div id="galeria" class="page">
  <div class="grid-gallery" id="grid"></div>
</div>

<!-- BACK TO TOP -->
<button class="back-top" id="back-top">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="18 15 12 9 6 15"/>
  </svg>
</button>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <div class="lb-toolbar">
    <button class="lb-btn" onclick="openShare()" title="Compartilhar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
      </svg>
    </button>
    <button class="lb-btn" onclick="toggleExif()" title="Informações">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="8.5" stroke-width="2"/>
        <line x1="12" y1="11" x2="12" y2="17"/>
      </svg>
    </button>
    <button class="lb-btn" onclick="toggleFS()" title="Tela cheia">
      <svg id="fs-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 3H5a2 2 0 0 0-2 2v3"/>
        <path d="M21 8V5a2 2 0 0 0-2-2h-3"/>
        <path d="M3 16v3a2 2 0 0 0 2 2h3"/>
        <path d="M16 21h3a2 2 0 0 0 2-2v-3"/>
      </svg>
    </button>
    <button class="lb-btn" onclick="closeLB()" title="Fechar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>

  <button class="lb-nav lb-prev" onclick="lbNav(-1)">&#8249;</button>
  <div class="lb-img-wrap" id="lb-wrap">
    <img id="lb-img" src="" alt="">
  </div>
  <button class="lb-nav lb-next" onclick="lbNav(1)">&#8250;</button>
  <div class="lb-counter" id="lb-counter"></div>

  <div class="exif-panel" id="exif-panel">
    <div class="exif-row" id="exif-camera-row" style="display:none"><span class="exif-label">CÂMERA</span><span class="exif-val" id="exif-camera"></span></div>
    <div class="exif-row" id="exif-lens-row"   style="display:none"><span class="exif-label">LENTE</span><span class="exif-val" id="exif-lens"></span></div>
    <div class="exif-row" id="exif-exp-row"    style="display:none"><span class="exif-label">EXPOSIÇÃO</span><span class="exif-val" id="exif-exp"></span></div>
    <div class="exif-row" id="exif-ap-row"     style="display:none"><span class="exif-label">ABERTURA</span><span class="exif-val" id="exif-ap"></span></div>
    <div class="exif-row" id="exif-iso-row"    style="display:none"><span class="exif-label">ISO</span><span class="exif-val" id="exif-iso"></span></div>
    <div class="exif-row" id="exif-fl-row"     style="display:none"><span class="exif-label">FOCAL</span><span class="exif-val" id="exif-fl"></span></div>
  </div>
</div>

<!-- SHARE OVERLAY -->
<div class="share-overlay" id="share-overlay" onclick="closeShareOutside(event)">
  <div class="share-menu">
    <button class="share-circle copy-btn" id="share-copy-btn" onclick="copyLink()" title="Copiar link">
      <svg viewBox="0 0 24 24">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
    </button>
    <button class="share-circle wa-btn" onclick="shareWhatsapp()" title="WhatsApp">
      <svg viewBox="0 0 24 24">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
        <path d="M12 0C5.373 0 0 5.373 0 12c0 2.126.553 4.123 1.522 5.858L0 24l6.335-1.493A11.951 11.951 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.882a9.876 9.876 0 0 1-5.031-1.378l-.36-.214-3.742.882.938-3.63-.235-.374A9.861 9.861 0 0 1 2.118 12C2.118 6.58 6.58 2.118 12 2.118c5.42 0 9.882 4.462 9.882 9.882 0 5.42-4.462 9.882-9.882 9.882z"/>
      </svg>
    </button>
    <button class="share-circle ig-btn" onclick="shareInstagram()" title="Instagram">
      <svg viewBox="0 0 24 24">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <circle cx="12" cy="12" r="4.5"/>
        <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/>
      </svg>
    </button>
    <button class="share-close" onclick="closeShare()">×</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script type="module" src="/src/js/main.js"></script>
</body>
</html>

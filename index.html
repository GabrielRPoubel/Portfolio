* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: #000;
  color: #e8e8e8;
  font-family: 'ClassyVogue', 'Georgia', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: space-between; align-items: center;
  padding: 1.4rem 2.5rem;
  transition: opacity 0.6s ease, background 0.6s ease;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
}
nav.scrolled {
  opacity: 0;
  pointer-events: none;
}
nav:hover {
  opacity: 1 !important;
  pointer-events: all !important;
  background: rgba(0,0,0,0.55);
}

.logo {
  font-size: 2.2rem;
  letter-spacing: 0.12em;
  color: #fff;
  font-family: 'ClassyVogue', 'Georgia', serif;
  font-weight: normal;
}
.nav-links { display: flex; gap: 2.5rem; list-style: none; align-items: center; }
.nav-links a {
  color: #666; text-decoration: none; font-size: 1.1rem;
  letter-spacing: 0.18em; transition: color 0.3s; cursor: pointer;
  font-family: 'ClassyVogue', 'Georgia', serif;
}
.nav-links a:hover, .nav-links a.active { color: #fff; }
.nav-links .ig-link { display: flex; align-items: center; }
.nav-links .ig-link svg {
  width: 26px; height: 26px; fill: none; stroke: #666;
  stroke-width: 1.4; transition: stroke 0.3s;
}
.nav-links .ig-link:hover svg { stroke: #fff; }

.page { display: none; min-height: 100vh; }
.page.active { display: block; }

/* HOME */
.photo-feed {
  display: flex; flex-direction: column; align-items: center;
  gap: 6px; padding: 0 0 6px 0;
}
.feed-item {
  width: 100%; cursor: pointer; overflow: hidden; background: #050505;
}
.feed-item img {
  width: 100%; display: block;
  filter: grayscale(100%) contrast(1.06);
  transition: opacity 0.5s;
  opacity: 0.88;
}
.feed-item:hover img { opacity: 1; }

/* GALERIA */
#galeria { padding: 5.5rem 1.5rem 3rem; }
.grid-gallery {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px;
}
.grid-item {
  overflow: hidden; cursor: pointer; background: #050505; aspect-ratio: 1;
}
.grid-item img {
  width: 100%; height: 100%; object-fit: cover;
  filter: grayscale(100%) contrast(1.06);
  transition: transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.4s;
  opacity: 0.82;
}
.grid-item:hover img { transform: scale(1.04); opacity: 1; }

/* LIGHTBOX */
.lightbox {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.97); z-index: 1000;
  flex-direction: column; align-items: center; justify-content: center;
}
.lightbox.active { display: flex; }
.lightbox-close {
  position: absolute; top: 1.2rem; right: 1.8rem;
  background: none; border: none; color: #444; font-size: 2rem;
  cursor: pointer; transition: color 0.3s;
  font-family: 'ClassyVogue', 'Georgia', serif; line-height: 1;
}
.lightbox-close:hover { color: #fff; }
.lightbox img {
  max-width: 90vw; max-height: 88vh; object-fit: contain;
  filter: grayscale(100%) contrast(1.06); display: block;
}
.lb-nav {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: #333; font-size: 2.5rem;
  cursor: pointer; padding: 1rem; transition: color 0.3s; line-height: 1;
}
.lb-nav:hover { color: #fff; }
.lb-prev { left: 1rem; }
.lb-next { right: 1rem; }
.lb-counter {
  position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
  font-size: 0.8rem; letter-spacing: 0.3em; color: #333;
  font-family: 'ClassyVogue', 'Georgia', serif;
}

/* MOBILE */
@media (max-width: 768px) {
  nav {
    padding: 1rem 1.2rem;
    background: rgba(0,0,0,0.75);
  }
  .logo {
    font-size: 1.4rem;
    letter-spacing: 0.08em;
  }
  .nav-links {
    gap: 1.2rem;
  }
  .nav-links a {
    font-size: 0.75rem;
    letter-spacing: 0.1em;
  }
  .nav-links .ig-link svg {
    width: 20px; height: 20px;
  }
  .photo-feed {
    gap: 4px;
  }
  #galeria {
    padding: 4.5rem 0.5rem 2rem;
  }
  .grid-gallery {
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
  }
  .lightbox img {
    max-width: 100vw;
    max-height: 80vh;
  }
  .lb-nav {
    font-size: 1.8rem;
    padding: 0.5rem;
  }
  .lb-prev { left: 0.2rem; }
  .lb-next { right: 0.2rem; }
  .lb-counter {
    font-size: 0.65rem;
    bottom: 1rem;
  }
  .lightbox-close {
    top: 0.8rem; right: 1rem;
    font-size: 1.6rem;
  }
}

@media (max-width: 480px) {
  .logo {
    font-size: 1.1rem;
  }
  .nav-links a {
    font-size: 0.65rem;
    letter-spacing: 0.06em;
  }
  .nav-links {
    gap: 0.8rem;
  }
  .grid-gallery {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>
<body>

<nav id="nav">
  <span class="logo"><strong>GABRIEL POUBEL</strong></span>
  <ul class="nav-links">
    <li><a class="active" onclick="showPage('home', this)">INÍCIO</a></li>
    <li><a onclick="showPage('galeria', this)">GALERIA</a></li>
    <li>
      <a href="https://instagram.com/gabrielrpoubel" target="_blank" class="ig-link" title="Instagram">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4.5"/>
          <circle cx="17.5" cy="6.5" r="1" fill="#666" stroke="none"/>
        </svg>
      </a>
    </li>
  </ul>
</nav>

<div id="home" class="page active">
  <div class="photo-feed" id="feed"></div>
</div>

<div id="galeria" class="page">
  <div class="grid-gallery" id="grid"></div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLB()">×</button>
  <button class="lb-nav lb-prev" onclick="lbNav(-1)">‹</button>
  <img id="lb-img" src="" alt="">
  <button class="lb-nav lb-next" onclick="lbNav(1)">›</button>
  <div class="lb-counter" id="lb-counter"></div>
</div>

<script>
      // ─── FOTOS ───────────────────────────────────────────────────────────────
  // Gerado automaticamente por gerar.py — não edite manualmente
  const fotos = [
    1,
    2,
    3,
  ].map(n => ({ src: `fotos/${n}.jpg`, alt: `${n}` }));
  // ─────────────────────────────────────────────────────────────────────────

  const feed = document.getElementById('feed');
  const grid = document.getElementById('grid');

  fotos.forEach((p, i) => {
    const fdiv = document.createElement('div');
    fdiv.className = 'feed-item';
    fdiv.onclick = () => openLB(i);
    const fimg = document.createElement('img');
    fimg.src = p.src; fimg.alt = p.alt; fimg.loading = 'lazy';
    fdiv.appendChild(fimg);
    feed.appendChild(fdiv);

    const gdiv = document.createElement('div');
    gdiv.className = 'grid-item';
    gdiv.onclick = () => openLB(i);
    const gimg = document.createElement('img');
    gimg.src = p.src; gimg.alt = p.alt; gimg.loading = 'lazy';
    gdiv.appendChild(gimg);
    grid.appendChild(gdiv);
  });

  function showPage(id, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.querySelectorAll('.nav-links a:not(.ig-link)').forEach(a => a.classList.remove('active'));
    if (el) el.classList.add('active');
    window.scrollTo(0, 0);
  }

  // Fade out da nav ao scrollar
  let scrollTimer;
  window.addEventListener('scroll', () => {
    const nav = document.getElementById('nav');
    if (window.scrollY > 80) {
      nav.classList.add('scrolled');
    } else {
      nav.classList.remove('scrolled');
    }
  }, { passive: true });

  let lbIndex = 0;
  function openLB(i) { lbIndex = i; updateLB(); document.getElementById('lightbox').classList.add('active'); }
  function closeLB() { document.getElementById('lightbox').classList.remove('active'); }
  function lbNav(d) { lbIndex = (lbIndex + d + fotos.length) % fotos.length; updateLB(); }
  function updateLB() {
    document.getElementById('lb-img').src = fotos[lbIndex].src;
    document.getElementById('lb-counter').textContent = `${lbIndex + 1} / ${fotos.length}`;
  }

  document.getElementById('lightbox').addEventListener('click', e => { if (e.target === e.currentTarget) closeLB(); });
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('active')) return;
    if (e.key === 'ArrowRight') lbNav(1);
    if (e.key === 'ArrowLeft') lbNav(-1);
    if (e.key === 'Escape') closeLB();
  });
</script>
</body>
</html>
